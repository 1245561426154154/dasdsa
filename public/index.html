<!DOCTYPE html>
<html>
<head>
<title>Script Protector</title>
<style>
body{background:#0d0d0d;color:#fff;font-family:Arial;text-align:center}textarea{width:80%;height:200px;background:#111;color:#fff;border:none;padding:10px}button{padding:10px 20px;background:#4CAF50;border:none;color:#fff;cursor:pointer}.link{margin-top:20px;color:#0ff}
</style>
</head>
<body>
<h1>Script protection</h1>
<textarea id="code"></textarea><br><br>
<button onclick="c()">Protect</button>
<div class="link" id="link"></div>
<script>
async function c(){let code=document.getElementById("code").value,res=await fetch("/create",{method:"POST",headers:{"Content-Type":"application/json","x-admin":"dxfc_admin"},body:JSON.stringify({code})}),d=await res.json();document.getElementById("link").innerHTML="Your script URL:<br><b>"+location.origin+d.link+"</b>"}
</script>
</body>
</html>
